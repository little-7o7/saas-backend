name: saas_shop
description: SaaS Shop Management App - Offline First
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  riverpod: ^3.2.1
  flutter_riverpod: ^3.3.1

  # HTTP
  dio: ^5.4.3
  pretty_dio_logger: ^1.3.1

  # Local database (offline-first)
  sqflite: ^2.3.2
  path: ^1.9.0

  # Auth & Storage
  flutter_secure_storage: ^10.0.0
  shared_preferences: ^2.2.3

  # Navigation
  go_router: ^17.2.0

  # UI
  cupertino_icons: ^1.0.8
  flutter_svg: ^2.0.10+1
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  fl_chart: ^1.2.0

  # QR Code
  qr_flutter: ^4.1.0
  mobile_scanner: ^7.2.0

  # Utils
  intl: ^0.20.2
  uuid: ^4.4.0
  connectivity_plus: ^7.1.0
  permission_handler: ^12.0.1

  # PDF/Printing
  pdf: ^3.11.1
  printing: ^5.13.1

  # SMS / URL launch
  url_launcher: ^6.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.11
  json_annotation: ^4.9.0
  json_serializable: ^6.8.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
